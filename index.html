<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BVUFSFJ — Дашборд лидов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --de-schwarz: #1c1c1c;
        --de-rot: #c8102e;
        --de-gold: #ffce00;
        --de-gold-soft: #fff8d6;
        --bg: #f0eeea;
        --card: #ffffff;
        --text: #1c1c1c;
        --muted: #4a4a4a;
        --line: #ddd8d0;
        --ok: #1b6b3a;
        --ok-bg: #e8f5ec;
        --warn: #9a5b00;
        --warn-bg: #fff6e0;
        --bad: #a31818;
        --bad-bg: #fdeaea;
        --info: #2a4a7a;
        --info-bg: #eaf0fa;
        --radius: 16px;
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
        --font-base: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", Roboto, Arial, sans-serif;
        font-size: var(--font-base);
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      .flag-bar {
        height: 5px;
        background: linear-gradient(90deg, var(--de-schwarz) 33.33%, var(--de-rot) 33.33% 66.66%, var(--de-gold) 66.66%);
      }

      .wrap {
        max-width: 1320px;
        margin: 0 auto;
        padding: 24px 24px 48px;
      }

      /* ── Hero ── */
      .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 32px;
        background: var(--card);
        border-radius: 20px;
        padding: 28px 36px;
        margin-bottom: 24px;
        box-shadow: var(--shadow);
        border: 1px solid var(--line);
      }

      .hero-text h1 {
        margin: 0 0 8px;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.15;
      }

      .hero-text p {
        margin: 0;
        font-size: 17px;
        color: var(--muted);
      }

      .search-orb {
        flex-shrink: 0;
        width: 130px;
        height: 130px;
        border-radius: 50%;
        border: 3px solid var(--de-schwarz);
        background: radial-gradient(circle at 35% 30%, #ffe566 0%, var(--de-gold) 55%, #d4a800 100%);
        box-shadow:
          0 6px 0 var(--de-schwarz),
          0 12px 32px rgba(0, 0, 0, 0.18);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        font-family: inherit;
        color: var(--de-schwarz);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .search-orb:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow:
          0 8px 0 var(--de-schwarz),
          0 18px 40px rgba(0, 0, 0, 0.22);
      }

      .search-orb:active {
        transform: translateY(2px);
        box-shadow:
          0 2px 0 var(--de-schwarz),
          0 6px 16px rgba(0, 0, 0, 0.15);
      }

      .search-orb svg {
        width: 32px;
        height: 32px;
      }

      .search-orb span {
        font-size: 15px;
        font-weight: 700;
        line-height: 1.2;
        text-align: center;
      }

      /* ── Search drawer ── */
      .search-drawer {
        display: none;
        margin-bottom: 24px;
        background: var(--card);
        border-radius: var(--radius);
        padding: 20px 24px;
        box-shadow: var(--shadow);
        border: 2px solid var(--de-gold);
        animation: slideDown 0.25s ease;
      }

      .search-drawer.open {
        display: block;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .search-drawer-inner {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .search-drawer-icon {
        flex-shrink: 0;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--de-gold-soft);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .search-drawer-icon svg {
        width: 22px;
        height: 22px;
        color: var(--de-schwarz);
      }

      #q {
        flex: 1;
        font-size: 18px;
        padding: 14px 18px;
        border-radius: 12px;
        border: 2px solid var(--line);
        background: #fafaf8;
        font-family: inherit;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      #q:focus {
        outline: none;
        border-color: var(--de-schwarz);
        box-shadow: 0 0 0 4px rgba(255, 206, 0, 0.35);
        background: #fff;
      }

      .search-close {
        flex-shrink: 0;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid var(--line);
        background: #fff;
        cursor: pointer;
        font-size: 18px;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, border-color 0.15s;
      }

      .search-close:hover {
        background: #fff0f2;
        border-color: var(--de-rot);
        color: var(--de-rot);
      }

      /* ── KPI tabs ── */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 14px;
        margin-bottom: 24px;
      }

      .kpi-card {
        background: var(--card);
        border: 2px solid var(--line);
        border-radius: var(--radius);
        padding: 18px 20px;
        border-bottom: 4px solid var(--accent, var(--de-schwarz));
        box-shadow: var(--shadow);
        cursor: pointer;
        text-align: left;
        font-family: inherit;
        color: inherit;
        transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      }

      .kpi-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.1);
      }

      .kpi-card.active {
        border-color: var(--de-schwarz);
        background: #fffdf5;
        box-shadow: 0 0 0 2px var(--de-schwarz), 0 8px 28px rgba(0, 0, 0, 0.1);
      }

      .kpi-card .val {
        font-size: 38px;
        font-weight: 700;
        line-height: 1;
        color: var(--val-color, var(--text));
      }

      .kpi-card .lbl {
        margin-top: 8px;
        font-size: 15px;
        color: var(--muted);
        font-weight: 600;
        line-height: 1.3;
      }

      .kpi-target { --accent: var(--de-gold); --val-color: #7a6200; }
      .kpi-a { --accent: #2d8a4e; --val-color: var(--ok); }
      .kpi-b { --accent: #d48806; --val-color: var(--warn); }
      .kpi-c { --accent: var(--de-rot); --val-color: var(--bad); }
      .kpi-app { --accent: var(--de-schwarz); }
      .kpi-src { --accent: var(--info); --val-color: var(--info); }

      /* ── Chart ── */
      .chart-section { margin-bottom: 24px; }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-head {
        padding: 16px 24px;
        border-bottom: 1px solid var(--line);
        background: #fafaf8;
      }

      .panel-head-title {
        font-size: 17px;
        font-weight: 600;
        margin: 0 0 6px;
      }

      .panel-head-desc {
        margin: 0;
        font-size: 15px;
        color: var(--muted);
        line-height: 1.45;
      }

      .panel-body { padding: 24px; }

      .chart-wrap {
        overflow: visible;
        margin-bottom: 8px;
      }

      .chart-wrap svg {
        display: block;
        overflow: visible;
      }

      .pipeline-steps {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-top: 20px;
      }

      .pipeline-step {
        background: #fafaf8;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
        border-top: 4px solid var(--step-color, var(--de-schwarz));
      }

      .pipeline-step .step-num {
        font-size: 13px;
        font-weight: 700;
        color: var(--step-color, var(--de-schwarz));
        margin-bottom: 4px;
      }

      .pipeline-step .step-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .pipeline-step .step-desc {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.4;
      }

      .pipeline-step .step-val {
        margin-top: 8px;
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
      }

      .chart-summary {
        margin-top: 16px;
        padding: 14px 18px;
        background: var(--de-gold-soft);
        border-radius: 12px;
        border: 1px solid #f0d878;
        font-size: 15px;
        line-height: 1.5;
      }

      .chart-summary strong {
        color: var(--text);
      }

      .chart-legend {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 16px;
        font-size: 15px;
        color: var(--muted);
      }

      .chart-legend span {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .chart-legend i {
        display: inline-block;
        width: 14px;
        height: 14px;
        border-radius: 3px;
      }

      /* ── Filters ── */
      .controls {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px 24px;
        margin-bottom: 24px;
        box-shadow: var(--shadow);
      }

      .controls-title {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 16px;
        color: var(--text);
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(4, 1fr) auto;
        gap: 14px;
        align-items: end;
      }

      .field label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 6px;
      }

      select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 2px solid var(--line);
        background: #fff;
        font-family: inherit;
        font-size: 15px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      select:focus {
        outline: none;
        border-color: var(--de-schwarz);
        box-shadow: 0 0 0 3px rgba(255, 206, 0, 0.3);
      }

      .btn-reset {
        padding: 12px 22px;
        border-radius: 10px;
        border: 2px solid var(--de-rot);
        background: #fff;
        color: var(--de-rot);
        cursor: pointer;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
        height: 46px;
        transition: background 0.15s;
      }

      .btn-reset:hover { background: #fff0f2; }

      /* ── Table ── */
      .table-panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .table-head-bar {
        padding: 16px 24px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fafaf8;
      }

      .table-head-bar h2 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .result-count {
        font-size: 15px;
        color: var(--muted);
        font-weight: 500;
      }

      .tableWrap { overflow: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 1100px; }
      th, td {
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
        font-size: 15px;
      }
      th {
        text-align: left;
        background: #f5f3ef;
        color: #333;
        font-size: 14px;
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      tbody tr:hover { background: var(--de-gold-soft); }
      tbody tr:nth-child(even) { background: #fafaf8; }
      tbody tr:nth-child(even):hover { background: var(--de-gold-soft); }

      td .t { font-weight: 600; font-size: 15px; margin-bottom: 4px; color: var(--text); }
      td .d { color: var(--muted); font-size: 14px; }
      td.reason { color: #444; font-size: 14px; max-width: 260px; line-height: 1.45; }

      .badge {
        font-size: 13px;
        border-radius: 8px;
        padding: 5px 10px;
        border: 1px solid;
        white-space: nowrap;
        display: inline-block;
        font-weight: 600;
      }

      .st-active { color: var(--ok); border-color: #9fd4b0; background: var(--ok-bg); }
      .st-unknown { color: #475569; border-color: #cbd5e1; background: #f8fafc; }
      .st-expired { color: var(--bad); border-color: #f5b0b0; background: var(--bad-bg); }
      .st-watch { color: var(--warn); border-color: #f5d08a; background: var(--warn-bg); }

      .gr-a { color: var(--ok); border-color: #9fd4b0; background: var(--ok-bg); }
      .gr-b { color: var(--warn); border-color: #f5d08a; background: var(--warn-bg); }
      .gr-c { color: var(--bad); border-color: #f5b0b0; background: var(--bad-bg); }
      .gr-source { color: var(--info); border-color: #b8cce8; background: var(--info-bg); }

      .link-btn {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 8px;
        background: var(--de-schwarz);
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.15s;
      }

      .link-btn:hover { background: var(--de-rot); }

      .empty, .error-box {
        text-align: center;
        color: var(--muted);
        font-size: 17px;
        padding: 48px 24px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }

      @media (max-width: 1100px) {
        .hero { flex-direction: column; text-align: center; }
        .kpi-grid { grid-template-columns: repeat(3, 1fr); }
        .filters { grid-template-columns: 1fr 1fr; }
        .pipeline-steps { grid-template-columns: repeat(2, 1fr); }
      }

      @media (max-width: 640px) {
        .hero-text h1 { font-size: 26px; }
        .search-orb { width: 110px; height: 110px; }
        .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        .kpi-card .val { font-size: 30px; }
      }
    </style>
  </head>
  <body>
    <div class="flag-bar"></div>
    <div class="wrap">
      <header class="hero">
        <div class="hero-text">
          <h1>Дашборд лидов BVUFSFJ</h1>
          <p>Мониторинг грантов · оценка A/B/C</p>
        </div>
        <button type="button" id="searchOrb" class="search-orb" aria-label="Открыть поиск лидов">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21"/>
          </svg>
          <span>Поиск<br>лидов</span>
        </button>
      </header>

      <div id="searchDrawer" class="search-drawer">
        <div class="search-drawer-inner">
          <div class="search-drawer-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <circle cx="11" cy="11" r="7"/>
              <line x1="16.5" y1="16.5" x2="21" y2="21"/>
            </svg>
          </div>
          <input id="q" type="search" placeholder="Введите URL, источник или описание лида..." autocomplete="off" />
          <button type="button" id="searchClose" class="search-close" aria-label="Закрыть поиск">✕</button>
        </div>
      </div>

      <section id="stats" class="kpi-grid" role="tablist" aria-label="Разделы лидов"></section>
      <section id="charts" class="chart-section"></section>

      <section class="controls">
        <div class="controls-title">Уточнить выборку</div>
        <div class="filters">
          <div class="field">
            <label for="sourceFilter">Источник</label>
            <select id="sourceFilter"><option value="">Все источники</option></select>
          </div>
          <div class="field">
            <label for="statusFilter">Статус</label>
            <select id="statusFilter">
              <option value="">Все статусы</option>
              <option value="active">Активный</option>
              <option value="rolling">Постоянный</option>
              <option value="watch">Скоро дедлайн</option>
              <option value="unknown">Неизвестно</option>
              <option value="expired">Истёк</option>
            </select>
          </div>
          <div class="field gradeFilterWrap">
            <label for="gradeFilter">Оценка</label>
            <select id="gradeFilter">
              <option value="">Все оценки</option>
              <option value="A">A — сильный</option>
              <option value="B">B — проверить</option>
              <option value="C">C — отсеять</option>
            </select>
          </div>
          <div class="field">
            <label for="dateFilter">Даты</label>
            <select id="dateFilter">
              <option value="">Все даты</option>
              <option value="with_dates">С датами</option>
              <option value="no_dates">Без дат</option>
            </select>
          </div>
          <button id="resetBtn" class="btn-reset" type="button">Сбросить</button>
        </div>
      </section>

      <section id="list"></section>
    </div>
    <!-- dashboard-build: 2026-06-10-demo-v5 -->
    <script src="./app.js?v=5"></script>
  </body>
</html>
